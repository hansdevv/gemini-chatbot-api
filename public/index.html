<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini AI Travel Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-wrapper">
      <div class="chat-container">
        <header class="chat-header">
          <div class="bot-avatar">🤖</div>
          <div class="header-info">
            <h1>Gemini AI Assistant</h1>
            <p class="bot-status">● Online - Travel Expert</p>
          </div>
        </header>
        <div id="chat-box" class="chat-box"></div>
        <form id="chat-form">
          <input type="text" id="user-input" placeholder="Type your travel question..." autocomplete="off" required />
          <button type="submit" id="send-btn">
            <span>Send</span>
            <svg viewBox="0 0 24 24" class="send-icon"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
          </button>
        </form>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
